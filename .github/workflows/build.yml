name: Build & Auto-Release

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: TicTacToeAI_Linux
            exe_name: tictactoe-ai
            sep: ":"
          - os: windows-latest
            artifact_name: TicTacToeAI_Windows
            exe_name: TicTacToeAI
            sep: ";"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv and dependencies
        run: |
          pip install uv
          uv sync

      - name: Build with PyInstaller
        # Forzamos bash para que el comando funcione igual en Windows y Linux
        shell: bash
        run: |
          uv run pyinstaller --noconfirm --onefile --windowed \
            --name "${{ matrix.exe_name }}" \
            --clean \
            --add-data "src${{ matrix.sep }}src" \
            --add-data "tictactoe_lookup.pkl${{ matrix.sep }}." \
            src/main.py

      # --- ESPECÍFICO PARA LINUX: CREAR .DEB ---
      - name: Create Debian Package
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p package/usr/bin
          mkdir -p package/DEBIAN
          cp "dist/${{ matrix.exe_name }}" package/usr/bin/

          cat <<EOF > package/DEBIAN/control
          Package: tictactoe-ai
          Version: 1.0.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Victor <tu@email.com>
          Description: TicTacToe AI con Q-Learning
          EOF

          dpkg-deb --build package tictactoe-ai.deb

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.exe_name }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}
            *.deb

  update_release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TicTacToeAI_All # Descarga todos con este patrón si es posible o uno por uno
        continue-on-error: true

      # Para simplificar la descarga en el release final:
      - uses: actions/download-artifact@v4
        with:
          pattern: TicTacToeAI_*
          merge-multiple: true

      - name: Update Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Development Build (Nightly)"
          files: |
            TicTacToeAI.exe
            tictactoe-ai
            tictactoe-ai.deb
          prerelease: true
          make_latest: true
